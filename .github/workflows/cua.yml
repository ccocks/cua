name: Computer Use Agent (Kimi K2.5 via NIM)

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Natural-language task for the agent"
        required: true
        default: "Open TextEdit, type 'Hello from Kimi K2.5 CUA!', and save the file as hello.txt on the Desktop."
      max_steps:
        description: "Max action steps before aborting"
        required: false
        default: "25"
      screenshot_interval:
        description: "Seconds to wait after each action before next screenshot"
        required: false
        default: "1.5"

jobs:
  cua:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (brew + pip) and configure TCC — all in parallel
        run: |
          set -euo pipefail

          # ── Background: brew install ffmpeg (skip if already present) ──
          if ! command -v ffmpeg &>/dev/null; then
            brew install ffmpeg &
            BREW_PID=$!
          else
            echo "ffmpeg already available, skipping brew"
            BREW_PID=""
          fi

          # ── Background: pip install Python deps ──
          pip install --quiet pyautogui pillow openai tenacity opencv-python &
          PIP_PID=$!

          # ── TCC ScreenCapture grants (runs concurrently with above) ──
          # Research basis: github.com/actions/runner-images blob/main/images/macos/
          #   scripts/build/configure-tccdb-macos.sh
          #
          # The official GHA runner image pre-bakes TCC grants at image-build time.
          # The access table uses 17 positional columns — full docs at the URL above.
          # Python binaries from setup-python land at a hostedtoolcache path that the
          # image doesn't know at build time, so we must add them at runtime.

          USER_DB="$HOME/Library/Application Support/com.apple.TCC/TCC.db"
          SYS_DB="/Library/Application Support/com.apple.TCC/TCC.db"

          echo "=== User TCC schema ==="
          sqlite3 "$USER_DB" ".schema access" || echo "(failed)"
          echo "=== Current ScreenCapture grants (user DB) ==="
          sqlite3 "$USER_DB" \
            "SELECT client, auth_value, auth_reason FROM access WHERE service='kTCCServiceScreenCapture';" \
            || echo "(failed)"
          echo "=== Current ScreenCapture grants (system DB) ==="
          sudo sqlite3 "$SYS_DB" \
            "SELECT client, auth_value, auth_reason FROM access WHERE service='kTCCServiceScreenCapture';" \
            || echo "(failed)"

          PYTHON_BIN="$(python3 -c 'import sys; print(sys.executable)')"
          PYTHON_REAL="$(python3 -c 'import os,sys; print(os.path.realpath(sys.executable))')"
          TS="$(date +%s)"

          make_row() {
            local client="$1"
            echo "'kTCCServiceScreenCapture','${client}',1,2,0,1,NULL,NULL,NULL,'UNUSED',NULL,0,${TS},NULL,NULL,'UNUSED',${TS}"
          }

          grant_both() {
            local row
            row="$(make_row "$1")"
            echo "  granting: $1"
            sqlite3     "$USER_DB" "INSERT OR REPLACE INTO access VALUES(${row});" 2>&1 || echo "    user DB insert failed"
            sudo sqlite3 "$SYS_DB" "INSERT OR REPLACE INTO access VALUES(${row});" 2>&1 || echo "    system DB insert failed"
          }

          echo "=== Adding Python ScreenCapture grants ==="
          grant_both "$PYTHON_BIN"
          if [ "$PYTHON_REAL" != "$PYTHON_BIN" ]; then
            grant_both "$PYTHON_REAL"
          fi
          grant_both "/usr/sbin/screencapture"

          echo "=== Flushing tccd ==="
          sudo killall tccd 2>/dev/null || killall tccd 2>/dev/null || true
          sleep 2

          echo "=== Verifying (user DB) ==="
          sqlite3 "$USER_DB" \
            "SELECT client, auth_value, auth_reason FROM access WHERE service='kTCCServiceScreenCapture' ORDER BY client;"

          # ── Wait for background installs to finish ──
          echo "=== Waiting for brew install ffmpeg ==="
          if [ -n "$BREW_PID" ]; then
            wait "$BREW_PID" || { echo "brew install failed"; exit 1; }
          fi
          echo "=== Waiting for pip install ==="
          wait "$PIP_PID" || { echo "pip install failed"; exit 1; }
          echo "=== All installs complete ==="

          # ── Verify Python deps and smoke-test screenshot ──
          python3 -c "import pyautogui; print('pyautogui ready')"

          echo "=== Smoke test ==="
          screencapture -D 1 -x /tmp/tcc_test.png
          ls -lh /tmp/tcc_test.png
          SIZE=$(stat -f%z /tmp/tcc_test.png)
          echo "Screenshot size: ${SIZE} bytes"
          if [ "$SIZE" -lt 50000 ]; then
            echo "WARNING: Screenshot is small — may be wallpaper-only (TCC not fully effective)"
          else
            echo "OK — screenshot looks like a full desktop capture"
          fi

      - name: Run CUA agent
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          CUA_TASK: ${{ github.event.inputs.task }}
          CUA_MAX_STEPS: ${{ github.event.inputs.max_steps }}
          CUA_SCREENSHOT_INTERVAL: ${{ github.event.inputs.screenshot_interval }}
        run: python cua/agent.py

      - name: Upload session screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cua-session-screenshots
          path: /tmp/cua_session/
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload session log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cua-session-log
          path: /tmp/cua_session/session.log
          retention-days: 1
          if-no-files-found: ignore