name: Computer Use Agent (Kimi K2.5 via NIM)

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Natural-language task for the agent"
        required: true
        default: "Open TextEdit, type 'Hello from Kimi K2.5 CUA!', and save the file as hello.txt on the Desktop."
      max_steps:
        description: "Max action steps before aborting"
        required: false
        default: "25"
      screenshot_interval:
        description: "Seconds to wait after each action before next screenshot"
        required: false
        default: "1.5"

jobs:
  cua:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          pip install --quiet pyautogui pillow openai tenacity

      # ── TCC bootstrap ───────────────────────────────────────────────────────
      # Research basis: github.com/actions/runner-images blob/main/images/macos/
      #   scripts/build/configure-tccdb-macos.sh
      #
      # The official GHA runner image pre-bakes TCC grants at image-build time.
      # The access table uses 17 positional columns (not the named subset we
      # previously used). Mismatched column counts caused our INSERTs to silently
      # fail or produce broken rows that tccd ignored.
      #
      # Column layout (17 cols, matching the official GHA script exactly):
      #  1  service                          TEXT
      #  2  client                           TEXT
      #  3  client_type                      INT   (0=bundle, 1=path)
      #  4  auth_value                       INT   (2=allow)
      #  5  auth_reason                      INT   (0=user-set, 4=system)
      #  6  auth_version                     INT   (1)
      #  7  csreq                            BLOB  (NULL for path-based)
      #  8  policy_id                        INT   (NULL)
      #  9  indirect_object_identifier_type  INT   (NULL or 0)
      # 10  indirect_object_identifier       TEXT  ('UNUSED' for non-AppleEvents)
      # 11  flags                            INT   (NULL)
      # 12  last_modified                    INT   (0 for path-based in official)
      # 13  [timestamp1]                     INT   (epoch seconds)
      # 14  NULL
      # 15  NULL
      # 16  'UNUSED'
      # 17  [timestamp2]                     INT   (same epoch seconds, repeat)
      #
      # Why Python isn't already covered: the official image only pre-grants
      # /bin/bash, /opt/hca/hosted-compute-agent, /usr/local/opt/runner/provisioner,
      # /usr/bin/osascript, and com.apple.Terminal. Python binaries from
      # setup-python land at a hostedtoolcache path that the image doesn't know
      # at build time, so we must add them at runtime.
      - name: Dump TCC schema and current ScreenCapture grants (diagnostic)
        run: |
          USER_DB="$HOME/Library/Application Support/com.apple.TCC/TCC.db"
          SYS_DB="/Library/Application Support/com.apple.TCC/TCC.db"
          echo "=== User TCC schema ==="
          sqlite3 "$USER_DB" ".schema access" || echo "(failed)"
          echo "=== Current ScreenCapture grants (user DB) ==="
          sqlite3 "$USER_DB" \
            "SELECT client, auth_value, auth_reason FROM access WHERE service='kTCCServiceScreenCapture';" \
            || echo "(failed)"
          echo "=== Current ScreenCapture grants (system DB) ==="
          sudo sqlite3 "$SYS_DB" \
            "SELECT client, auth_value, auth_reason FROM access WHERE service='kTCCServiceScreenCapture';" \
            || echo "(failed)"

      - name: Grant ScreenCapture to Python (correct 17-column format)
        run: |
          set -euo pipefail

          USER_DB="$HOME/Library/Application Support/com.apple.TCC/TCC.db"
          SYS_DB="/Library/Application Support/com.apple.TCC/TCC.db"

          PYTHON_BIN="$(python3 -c 'import sys; print(sys.executable)')"
          PYTHON_REAL="$(python3 -c 'import os,sys; print(os.path.realpath(sys.executable))')"
          TS="$(date +%s)"

          # Build a values string matching the official 17-column format exactly.
          # auth_reason=0 matches how the official script registers /bin/bash.
          make_row() {
            local client="$1"
            echo "'kTCCServiceScreenCapture','${client}',1,2,0,1,NULL,NULL,NULL,'UNUSED',NULL,0,${TS},NULL,NULL,'UNUSED',${TS}"
          }

          grant_both() {
            local row
            row="$(make_row "$1")"
            echo "  granting: $1"
            sqlite3     "$USER_DB" "INSERT OR REPLACE INTO access VALUES(${row});" 2>&1 || echo "    user DB insert failed"
            sudo sqlite3 "$SYS_DB" "INSERT OR REPLACE INTO access VALUES(${row});" 2>&1 || echo "    system DB insert failed"
          }

          echo "=== Adding Python ScreenCapture grants ==="
          grant_both "$PYTHON_BIN"
          # Only add PYTHON_REAL if it differs from PYTHON_BIN
          if [ "$PYTHON_REAL" != "$PYTHON_BIN" ]; then
            grant_both "$PYTHON_REAL"
          fi
          # screencapture binary itself (runs as child of Python/bash)
          grant_both "/usr/sbin/screencapture"

          echo "=== Flushing tccd ==="
          sudo killall tccd 2>/dev/null || killall tccd 2>/dev/null || true
          sleep 2

          echo "=== Verifying (user DB) ==="
          sqlite3 "$USER_DB" \
            "SELECT client, auth_value, auth_reason FROM access WHERE service='kTCCServiceScreenCapture' ORDER BY client;"

          echo "=== Smoke test ==="
          screencapture -D 1 -x /tmp/tcc_test.png
          ls -lh /tmp/tcc_test.png
          # If the png is under ~50KB it's just a wallpaper (no windows captured).
          # A proper capture with UI elements is typically much larger.
          SIZE=$(stat -f%z /tmp/tcc_test.png)
          echo "Screenshot size: ${SIZE} bytes"
          if [ "$SIZE" -lt 50000 ]; then
            echo "WARNING: Screenshot is small — may be wallpaper-only (TCC not fully effective)"
          else
            echo "OK — screenshot looks like a full desktop capture"
          fi

      - name: Run CUA agent
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          CUA_TASK: ${{ github.event.inputs.task }}
          CUA_MAX_STEPS: ${{ github.event.inputs.max_steps }}
          CUA_SCREENSHOT_INTERVAL: ${{ github.event.inputs.screenshot_interval }}
        run: python cua/agent.py

      - name: Upload session screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cua-session-screenshots
          path: /tmp/cua_session/
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload session log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cua-session-log
          path: /tmp/cua_session/session.log
          retention-days: 1
          if-no-files-found: ignore