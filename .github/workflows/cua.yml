name: Computer Use Agent (Kimi K2.5 via NIM)

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Natural-language task for the agent"
        required: true
        default: "Open TextEdit, type 'Hello from Kimi K2.5 CUA!', and save the file as hello.txt on the Desktop."
      max_steps:
        description: "Max action steps before aborting"
        required: false
        default: "25"
      screenshot_interval:
        description: "Seconds to wait after each action before next screenshot"
        required: false
        default: "1.5"

jobs:
  cua:
    runs-on: macos-latest          # Real macOS display — no Xvfb needed
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Python ─────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          pip install --quiet \
            pyautogui \
            pillow \
            openai \
            tenacity

      # ── macOS TCC bootstrap ─────────────────────────────────────────────────
      # Writes directly to the user TCC database to pre-grant Screen Recording
      # for every binary in the call chain, suppressing the
      # "bash is requesting to bypass the system private window server" dialog.
      #
      # Design notes:
      #   auth_value=2      → always allow
      #   client_type=1     → path-based identity. Bundle-ID type (0) only
      #                       applies to signed .app bundles; CI Python has none.
      #   killall tccd      → tccd caches decisions in memory; kill it so it
      #                       re-reads the DB. launchd restarts it instantly.
      #   Schema stability  → the columns used here have been stable since macOS 11.
      #                       The old `allowed` column was removed in Big Sur.
      #   We do NOT use     → `tccutil reset ScreenCapture` because that nukes
      #                       existing grants and re-triggers the dialog.
      - name: Grant Screen Recording permission (suppress consent dialog)
        run: |
          set -euo pipefail

          TCC_DB="$HOME/Library/Application Support/com.apple.TCC/TCC.db"
          PYTHON_BIN="$(python3 -c 'import sys; print(sys.executable)')"
          PYTHON_REAL="$(python3 -c 'import os,sys; print(os.path.realpath(sys.executable))')"

          grant() {
            local client="$1"
            echo "  granting ScreenCapture: $client"
            sqlite3 "$TCC_DB" \
              "INSERT OR REPLACE INTO access
                 (service, client, client_type, auth_value, auth_reason,
                  auth_version, indirect_object_identifier, flags, last_modified)
               VALUES
                 ('kTCCServiceScreenCapture',
                  '$client', 1, 2, 4, 1, 'UNUSED', 0,
                  strftime('%s','now'));"
          }

          echo "=== Patching: $TCC_DB ==="
          # Cover both shells GHA may use (bash on older runners, zsh on newer)
          grant "/bin/bash"
          grant "/bin/zsh"
          # Python — shim path and real binary path may differ
          grant "/usr/bin/python3"
          grant "$PYTHON_BIN"
          grant "$PYTHON_REAL"
          # The actual capture binary
          grant "/usr/sbin/screencapture"

          echo "=== Flushing tccd cache ==="
          # tccd keeps an in-memory cache — restart it so our inserts take effect.
          # launchd brings it back up automatically within ~1 second.
          killall tccd 2>/dev/null || true
          sleep 1

          echo "=== Verifying grants ==="
          sqlite3 "$TCC_DB" \
            "SELECT client, auth_value FROM access
             WHERE service='kTCCServiceScreenCapture'
             ORDER BY client;"

          echo "=== Smoke test ==="
          screencapture -x /tmp/tcc_test.png && echo "OK — screen capture works without dialog"

      # ── Run the agent ───────────────────────────────────────────────────────
      - name: Run CUA agent
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          CUA_TASK: ${{ github.event.inputs.task }}
          CUA_MAX_STEPS: ${{ github.event.inputs.max_steps }}
          CUA_SCREENSHOT_INTERVAL: ${{ github.event.inputs.screenshot_interval }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python cua/agent.py

      # ── Upload artefacts ─────────────────────────────────────────────────────
      - name: Upload session screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cua-session-screenshots
          path: /tmp/cua_session/
          if-no-files-found: ignore

      - name: Upload session log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cua-session-log
          path: /tmp/cua_session/session.log
          if-no-files-found: ignore
